<!DOCTYPE html>
<html>
<head>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-user-drag: none;
      cursor: crosshair;
    }
    #backdrop {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 10;
    }
    #screen-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      z-index: 1;
    }
    #selection-box {
      position: absolute;
      border: 2px dashed #06b6d4;
      background: rgba(6, 182, 212, 0.1);
      display: none;
      z-index: 20;
      pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
    }
    body.drawing #backdrop {
      display: none;
    }
    #instructions {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 30;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <img id="screen-image" src="" draggable="false"/>
  <div id="backdrop"></div>
  <div id="selection-box"></div>
  <div id="instructions">Drag to select an area for AI analysis (Press Esc to cancel)</div>

  <script src="./snipping.js"></script>
</body>
</html>
